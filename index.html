button{
    margin-top:20px;
    background:#ffcc00;
    color:#000;
    border:none;
    padding:14px 25px;
    font-size:1em;
    font-weight:bold;
    border-radius:40px;
    cursor:pointer;
    transition:0.25s;
    width:90%;

button:hover:enabled{transform:scale(1.05);background:#ffd740;}
footer{margin-top:12px;font-size:0.9em;opacity:0.9;}

    <p class="detalle">🔥 Por la compra de <strong>1 CUARTO DE POLLO A LA LEÑA</strong><br>📍 Trinidad</p>

    <button id="btnPremio" onclick="reclamarPremio()">Reclamar mi premio</button>
    <footer>Go Pollos Rhosse • 📞 68972863</footer>
</div>

<audio id="alertaAudio">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
function reclamarPremio(){
    location.href="https://wa.me/59168972863?text=Hola%20Go%20Pollos%20Rhosse,%20escane%C3%A9%20el%20QR%20y%20gan%C3%A9%20una%20gaseosa%20Mini%20gratis%20por%20la%20compra%20de%20un%20Cuarto%20de%20pollo%20a%20la%20leña.";
}

// Confetti
const colores=["#ffcc00","#ff9800","#d50000","#ffffff"];
for(let i=0;i<50;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.backgroundColor=colores[Math.floor(Math.random()*colores.length)];
    c.style.animationDuration=(Math.random()*3+2)+"s";
    c.style.width=c.style.height=(Math.random()*8+6)+"px";
    document.body.appendChild(c);
}

// Countdown
let endDate=new Date(); endDate.setHours(endDate.getHours()+2);
function updateCountdown(){
    let now=new Date();
    let diff=endDate-now;if(diff<0) diff=0;
    let h=Math.floor(diff/1000/60/60);
    let m=Math.floor((diff/1000/60)%60);
    let s=Math.floor((diff/1000)%60);
    document.getElementById("timer").textContent=
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if(diff<=0) document.getElementById("btnPremio").disabled=true;
}
setInterval(updateCountdown,1000); updateCountdown();

// Cupos
let cupos=8;
const alertaAudio=document.getElementById("alertaAudio");
function updateSlots(){
    if(cupos>0){
        cupos-=Math.floor(Math.random()*2);
        if(cupos<0) cupos=0;
        let el=document.getElementById("cupos");
        el.textContent=cupos;
        // Alerta visual y sonora si <=5
        if(cupos<=5 && cupos>0){
            el.style.animation="blink 0.5s infinite";
            document.getElementById("btnPremio").style.animation="blink 0.5s infinite";
            alertaAudio.play().catch(()=>{});
        }else{
            el.style.animation="";
            document.getElementById("btnPremio").style.animation="";
        }
        if(cupos===0) document.getElementById("btnPremio").disabled=true;
    }
}
setInterval(updateSlots,5000);
</script>

</body>
