<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Go Pollos</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#000,#8B0000);
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
    font-size:28px;
}

.alerta{
    background:#FFD700;
    color:black;
    padding:10px;
    font-weight:bold;
}

.precio{
    font-size:20px;
    margin:20px 0;
}

.btn{
    background:#25D366;
    padding:15px 25px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.cupos{
    margin-top:15px;
    font-size:18px;
}

.panel{
    display:none;
    position:fixed;
    top:20%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body onclick="activarPanel()">

<h1>🔥 DÍA DEL PADRE 🔥</h1>

<div class="alerta">
⚠️ SOLO PROMOS PARA PAPÁ ⚠️
</div>

<div class="precio" id="mensajePromo">
🎉 Regálale algo que sí le gusta a Papá
</div>

<button class="btn" id="btnPedir">
📲 PEDIR AHORA
</button>

<div class="cupos">
⏳ Cupos disponibles: <span id="cupos">25</span>
</div>

<!-- PANEL OCULTO -->
<div class="panel" id="panelTemas">
<h3>Seleccionar Temática</h3>
<select id="selectorTema">
<option value="padre">Día del Padre</option>
<option value="madre">Día de la Madre</option>
<option value="enamorados">San Valentín</option>
<option value="navidad">Navidad</option>
<option value="patria">Fiestas Patrias</option>
</select>
<br><br>
<button onclick="aplicarTema()">Aplicar</button>
<button onclick="cerrarPanel()">Cerrar</button>
</div>

<script>

/* ===== CONTADOR CUPOS ===== */
let cupos = 25;

function bajarCupos(){
    if(cupos > 0){
        cupos--;
        document.getElementById("cupos").textContent = cupos;

        if(cupos <= 10){
            document.getElementById("cupos").style.color = "yellow";
        }

        if(cupos === 0){
            document.getElementById("btnPedir").disabled = true;
        }
    }
}

setInterval(bajarCupos, 4500);


/* ===== PANEL OCULTO ===== */
let contadorClicks = 0;

function activarPanel(){
    contadorClicks++;
    if(contadorClicks >= 5){
        document.getElementById("panelTemas").style.display = "block";
        contadorClicks = 0;
    }
}

function cerrarPanel(){
    document.getElementById("panelTemas").style.display = "none";
}

function aplicarTema(){
    let tema = document.getElementById("selectorTema").value;

    const titulo = document.querySelector("h1");
    const alerta = document.querySelector(".alerta");
    const body = document.body;
    const mensaje = document.getElementById("mensajePromo");

    if(tema === "madre"){
        body.style.background = "linear-gradient(180deg,#4a001f,#b30059)";
        titulo.innerHTML = "🌸 DÍA DE LA MADRE 🌸";
        alerta.innerHTML = "💐 SOLO PROMOS PARA MAMÁ 💐";
        mensaje.innerHTML = "👑 Regálale algo especial a Mamá";
    }

    if(tema === "padre"){
        body.style.background = "linear-gradient(180deg,#000,#8B0000)";
        titulo.innerHTML = "🔥 DÍA DEL PADRE 🔥";
        alerta.innerHTML = "⚠️ SOLO PROMOS PARA PAPÁ ⚠️";
        mensaje.innerHTML = "🎉 Regálale algo que sí le gusta a Papá";
    }

    if(tema === "enamorados"){
        body.style.background = "linear-gradient(180deg,#800000,#ff0033)";
        titulo.innerHTML = "❤️ SAN VALENTÍN ❤️";
        alerta.innerHTML = "💘 PROMO PARA ENAMORADOS 💘";
        mensaje.innerHTML = "💖 Comparte algo delicioso con tu persona especial";
    }

    if(tema === "navidad"){
        body.style.background = "linear-gradient(180deg,#003300,#cc0000)";
        titulo.innerHTML = "🎄 NAVIDAD 🎄";
        alerta.innerHTML = "🎁 PROMO NAVIDEÑA 🎁";
        mensaje.innerHTML = "🎅 Celebra en familia con sabor navideño";
    }

    if(tema === "patria"){
        body.style.background = "linear-gradient(180deg,#d52b1e,#ffd700,#007a33)";
        titulo.innerHTML = "🇧🇴 FIESTAS PATRIAS 🇧🇴";
        alerta.innerHTML = "🎉 PROMO BOLIVIANA 🎉";
        mensaje.innerHTML = "🇧🇴 Celebra con orgullo y sabor boliviano";
    }

    cerrarPanel();
}

</script>

</body>
</html>
