<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premio Sorpresa | Go Pollos Rhosse</title>

<meta name="description" content="Gana una gaseosa gratis de 2L por la compra de un pollo entero a la leña en Go Pollos Rhosse - Trinidad.">
<meta property="og:title" content="🎉 ¡Sorpresa! Gaseosa Gratis 2L 🍗🔥">
<meta property="og:description" content="Escaneaste el QR y ganaste una gaseosa gratis de 2L por la compra de un pollo entero.">
<meta property="og:image" content="logo.png">
<meta property="og:type" content="website">
<meta property="og:locale" content="es_BO">

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #ffcc00, #ff7a00, #000);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        text-align: center;
        overflow-x: hidden;
        padding: 10px;
    }

    .card {
        background: rgba(0,0,0,0.75);
        border-radius: 25px;
        padding: 20px 15px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        border: 3px solid #ffcc00;
        animation: zoomIn 0.9s ease;
        position: relative;
        z-index: 2;
    }

    @keyframes zoomIn {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .logo {
        max-width: 140px;
        width: 40%;
        margin-bottom: 12px;
    }

    .emoji {
        font-size: 3.2em;
        animation: bounce 1.3s infinite;
        margin-bottom: 12px;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    h1 {
        color: #ffcc00;
        font-size: 1.9em;
        margin: 10px 0;
    }

    .premio {
        background: linear-gradient(45deg, #d50000, #ff1744);
        padding: 14px;
        border-radius: 18px;
        margin: 16px 0;
        font-size: 1.2em;
        font-weight: bold;
    }

    .detalle {
        font-size: 1em;
        line-height: 1.4em;
    }

    .detalle strong { color: #ffcc00; }

    button {
        margin-top: 20px;
        background: #ffcc00;
        color: #000;
        border: none;
        padding: 14px 25px;
        font-size: 1em;
        font-weight: bold;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.25s;
        width: 90%;
        max-width: 300px;
    }

    button:disabled {
        background: #999;
        cursor: not-allowed;
    }

    button:hover:enabled {
        transform: scale(1.05);
        background: #ffd740;
    }

    footer {
        margin-top: 12px;
        font-size: 0.9em;
        opacity: 0.9;
    }

    /* Countdown y Cupos */
    .countdown, .slots {
        margin: 12px 0;
        font-size: 1em;
        font-weight: bold;
        background: linear-gradient(90deg, #ffcc00, #ff7a00);
        padding: 10px;
        border-radius: 15px;
        color: #000;
    }

    /* Confetti */
    .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -10px;
        animation: fall linear infinite;
        opacity: 0.85;
        z-index: 1;
        pointer-events: none;
    }

    @keyframes fall {
        to { transform: translateY(110vh) rotate(360deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
        h1 { font-size: 1.6em; }
        .premio { font-size: 1.1em; padding: 12px; }
        .emoji { font-size: 2.8em; }
        button { padding: 12px 20px; font-size: 0.95em; }
        .countdown, .slots { font-size: 0.9em; padding: 8px; }
    }
</style>
</head>

<body>

<div class="card">
    <img src="logo.png" alt="Go Pollos Rhosse" class="logo">

    <div class="emoji">🎉🥤🍗</div>

    <h1>¡Sorpresa!</h1>

    <div class="premio">¡GANASTE UNA GASEOSA GRATIS DE 2L!</div>

    <p class="detalle">
        🔥 Por la compra de <strong>1 POLLO ENTERO A LA LEÑA</strong><br>
        📍 Trinidad
    </p>

    <!-- Countdown y cupos -->
    <div class="countdown" id="countdown">⏰ Oferta termina en: <span id="timer">00:00:00</span></div>
    <div class="slots" id="slots">⚡ Cupos disponibles: <span id="cupos">50</span></div>

    <button id="btnPremio" onclick="reclamarPremio()">Reclamar mi premio</button>

    <footer>Go Pollos Rhosse • 📞 68972863</footer>
</div>

<script>
    function reclamarPremio() {
        location.href = "https://wa.me/59168972863?text=Hola%20Go%20Pollos%20Rhosse,%20escane%C3%A9%20el%20QR%20y%20gan%C3%A9%20una%20gaseosa%20gratis%20de%202L%20por%20la%20compra%20de%20un%20pollo%20entero.";
    }

    // Confeti
    const colores = ["#ffcc00", "#ff9800", "#d50000", "#ffffff"];
    for (let i = 0; i < 50; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        c.style.width = c.style.height = (Math.random() * 8 + 6) + "px";
        document.body.appendChild(c);
    }

    // CUENTA REGRESIVA
    let endDate = new Date();
    endDate.setHours(endDate.getHours() + 2); // Cambia aquí la duración
    function updateCountdown() {
        let now = new Date();
        let diff = endDate - now;
        if(diff < 0) diff = 0;
        let hours = Math.floor(diff / 1000 / 60 / 60);
        let minutes = Math.floor((diff / 1000 / 60) % 60);
        let seconds = Math.floor((diff / 1000) % 60);
        document.getElementById("timer").textContent =
            `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

        // Desactivar botón si tiempo terminado
        if(diff <= 0) document.getElementById("btnPremio").disabled = true;
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // CUPOS DISPONIBLES
    let cupos = 50;
    function updateSlots() {
        if(cupos > 0){
            cupos -= Math.floor(Math.random() * 2); // baja 0 o 1
            if(cupos < 0) cupos = 0;
            document.getElementById("cupos").textContent = cupos;

            // Desactivar botón si cupos agotados
            if(cupos === 0) document.getElementById("btnPremio").disabled = true;
        }
    }
    setInterval(updateSlots, 5000);
</script>

</body>
</html>
